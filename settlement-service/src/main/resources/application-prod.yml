spring:

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  # Production JPA 설정
  jpa:
    show-sql: false  # SQL 로그 끄기 (ddl-auto는 application.yml의 update 사용)

logging:
  level:
    root: INFO
    com.thock.back: INFO

swagger:
  server:
    url: ${SWAGGER_SERVER_URL:https://api.thock.site}
    description: Production API Gateway