spring:
  application:
    name: settlement_service

  datasource:
    # 1. 포트를 현재 띄워둔 DB에 맞춤 (개별 도커면 3306, 전체 도커면 3307)
    # 2. DB 이름을 실제 존재하는 settlement_db로 변경하거나, DB에 test_db를 생성해줘야 함
    url: jdbc:mysql://localhost:3306/settlement_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET_KEY:}
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: "thock"