name: Bug Report
description: 버그 이슈
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        길게 적지 않아도 됩니다.
        어디서 문제가 났는지, 무엇을 고치면 끝나는지만 적어주세요.

  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어디서 어떤 문제가 발생했는지 한두 문장으로 작성해주세요.
      placeholder: 예) 상품 수정 API 호출 시 500 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 해결 기준
      description: 수정 후 어떤 상태가 되면 완료인지 적어주세요.
      placeholder: |
        - 상품 수정 요청이 정상 응답을 반환한다.
        - 동일 케이스로 재호출해도 에러가 발생하지 않는다.
    validations:
      required: true

  - type: textarea
    id: note
    attributes:
      label: 참고 메모
      description: 재현 방법, 에러 로그, 원인 추정 등 필요한 정보만 선택해서 적어주세요.
      placeholder: |
        - 재현: 관리자 권한 없이 수정 요청 시 발생
        - 로그: IllegalArgumentException ...
    validations:
      required: false
