name: Task
description: 작업 이슈
title: "[TASK] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        리팩토링, 문서화, 설정 변경 같은 일반 작업은 아래 2~3칸이면 충분합니다.

  - type: textarea
    id: reason
    attributes:
      label: 작업 배경
      description: 왜 이 작업이 필요한지 간단히 적어주세요.
      placeholder: 예) UserService에 중복 로직이 많아 수정 시 실수가 발생하고 있습니다.
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: 할 일
      description: 실제로 수행할 작업만 체크리스트 형태로 적어주세요.
      placeholder: |
        - 공통 로직 메서드로 추출
        - 서비스 테스트 보강
        - 관련 문서 업데이트
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 선택 사항입니다. 완료 판단 기준이 있으면 적어주세요.
      placeholder: |
        - 중복 로직이 제거된다.
        - 기존 테스트가 모두 통과한다.
    validations:
      required: false

  - type: textarea
    id: note
    attributes:
      label: 참고 메모
      description: 관련 이슈, 참고 링크, 남길 메모가 있을 때만 작성해주세요.
    validations:
      required: false
