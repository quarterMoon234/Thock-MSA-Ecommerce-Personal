name: Test
description: 테스트 이슈
title: "[TEST] "
labels: ["test"]
body:
  - type: markdown
    attributes:
      value: |
        테스트 이슈는 무엇을 검증할지와 완료 기준만 보이면 충분합니다.

  - type: textarea
    id: goal
    attributes:
      label: 테스트 목표
      description: 어떤 테스트를 왜 추가하거나 보강하는지 짧게 작성해주세요.
      placeholder: 예) 상품 검색 API의 정상/예외 흐름을 검증하는 통합 테스트를 추가합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 검증 범위
      description: 확인할 시나리오를 체크리스트나 짧은 문장으로 적어주세요.
      placeholder: |
        - 정상 검색 결과 반환
        - 검색어 누락 시 예외 응답 반환
        - 빈 결과 목록 처리 확인
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 어떤 상태면 테스트 작업이 끝났다고 볼 수 있는지 적어주세요.
      placeholder: |
        - 핵심 시나리오 테스트가 모두 추가된다.
        - 로컬/CI에서 테스트가 통과한다.
    validations:
      required: false

  - type: textarea
    id: note
    attributes:
      label: 참고 메모
      description: 테스트 데이터, 실행 방법, 참고 링크가 있을 때만 작성해주세요.
    validations:
      required: false
