name: Feature Request
description: 기능 이슈
title: "[FEAT] "
labels: ["feat"]
body:
  - type: markdown
    attributes:
      value: |
        기능 이슈는 "무엇을 왜 만드는지"와 "어디까지 만들지"만 보이면 충분합니다.

  - type: textarea
    id: goal
    attributes:
      label: 기능 목표
      description: 어떤 기능을 왜 추가하는지 짧게 작성해주세요.
      placeholder: 예) 상품 검색 API를 추가해 사용자가 이름으로 상품을 조회할 수 있게 합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 내용
      description: 구현 범위를 체크리스트나 짧은 문장으로 적어주세요.
      placeholder: |
        - 검색 API 엔드포인트 추가
        - 이름 기반 조회 서비스 로직 구현
        - 기본 조회 테스트 작성
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 어떤 상태면 이 기능이 끝났다고 볼 수 있는지 적어주세요.
      placeholder: |
        - 이름으로 상품 목록 조회가 가능하다.
        - 정상/예외 케이스 테스트가 통과한다.
    validations:
      required: false

  - type: textarea
    id: note
    attributes:
      label: 참고 메모
      description: API 예시, 참고 링크, 화면 흐름 등 필요할 때만 작성해주세요.
    validations:
      required: false
