name: PR Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"
          
          # 예) [FEAT] #1 회원가입 기능 구현
          REGEX='^\[(BUG|FEAT|TASK|TEST)\]'
          
          if [[ ! "$TITLE" =~ $REGEX ]]; then
            echo "::error::PR 제목이 규칙을 만족하지 않습니다."
            echo ""
            echo "올바른 형식:"
            echo "  [TYPE] #이슈번호 작업요약"
            echo ""
            echo "예시:"
            echo "  [FEAT] #1 회원가입 API 구현"
            echo "  [BUG] #5 JWT 토큰 만료 처리 버그 수정"
            echo "  [TASK] #10 UserService 리팩토링"
            echo "  [TEST] #12 상품 검색 통합 테스트 추가"
            echo ""
            echo "사용 가능한 TYPE:"
            echo "  BUG      : 버그 수정"
            echo "  FEAT     : 새로운 기능 추가"
            echo "  TASK     : 리팩토링, 문서화, 설정 등 일반 작업"
            echo "  TEST     : 테스트 코드 작성 및 테스트 환경 개선"
            exit 1
          fi
          
          echo "PR 제목이 규칙을 만족합니다."

      - name: Validate branch name
        # main으로 머지하는 PR은 브랜치명 검증 스킵
        if: github.base_ref != 'main'
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          
          # type/이슈번호-도메인-작업요약 형식
          # 예) feat/1-member-login, bug/5-auth-token
          REGEX='^(bug|feat|task|test)\/[1-9][0-9]*-[a-zA-Z0-9]+(-[a-zA-Z0-9]+)*$'
          
          if [[ ! "$BRANCH" =~ $REGEX ]]; then
            echo "::error::브랜치명이 규칙을 만족하지 않습니다."
            echo ""
            echo "올바른 형식:"
            echo "  type/이슈번호-도메인-작업요약"
            echo ""
            echo "예시:"
            echo "  feat/1-member-social-login"
            echo "  feat/1-member"
            echo "  bug/5-auth-token-expire"
            echo "  task/10-user-service-refactor"
            echo "  test/12-product-search-integration"
            echo ""
            echo "사용 가능한 type (소문자):"
            echo "  bug, feat, task, test"
            echo ""
            echo "브랜치명 규칙:"
            echo "  - 전부 소문자"
            echo "  - # 없이 숫자만"
            echo "  - 하이픈(-)으로 구분"
            echo "  - 최소 형식: type/숫자-도메인"
            echo "  - 확장 형식: type/숫자-도메인-작업요약-추가설명"
            exit 1
          fi
          
          echo "브랜치명이 규칙을 만족합니다."
