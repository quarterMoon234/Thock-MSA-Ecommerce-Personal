apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: thock-prod
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Kubernetes Pod logs scraping
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - thock-prod
        relabel_configs:
          # Only scrape pods with specific labels
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: (api-gateway|member-service|product-service|market-service|payment-service|settlement-service)

          # Set job label from pod label
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job

          # Set namespace label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          # Set pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          # Set container name label
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          # Set log path
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log

        pipeline_stages:
          # Parse JSON logs
          - cri: {}

          # Extract fields from JSON
          - json:
              expressions:
                level: level
                logger: logger_name
                message: message
                timestamp: timestamp

          # Set labels
          - labels:
              level:
              logger:

          # Output stage
          - output:
              source: message