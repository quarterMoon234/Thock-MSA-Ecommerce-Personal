apiVersion: v1
kind: ConfigMap
metadata:
  name: common-config
  namespace: thock-prod
data:
  # 시간대 설정
  TZ: "Asia/Seoul"

  # Java 옵션
  JAVA_OPTS: "-Duser.timezone=Asia/Seoul"

  # Spring 프로파일
  SPRING_PROFILES_ACTIVE: "prod"

  # MySQL 설정
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"

  # Kafka 설정
  KAFKA_BOOTSTRAP_SERVERS: "redpanda:29092"

  # 로그 경로
  LOG_PATH: "/app/logs"