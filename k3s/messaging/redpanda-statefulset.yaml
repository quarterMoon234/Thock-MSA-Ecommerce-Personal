apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: thock-prod
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: redpandadata/redpanda:v23.3.5
        command:
          - /bin/bash
          - -c
          - |
            /usr/bin/rpk redpanda start \
              --smp 1 \
              --memory 512M \
              --reserve-memory 0M \
              --overprovisioned \
              --kafka-addr PLAINTEXT://0.0.0.0:29092 \
              --advertise-kafka-addr PLAINTEXT://redpanda-0.redpanda.thock-prod.svc.cluster.local:29092
        ports:
        - containerPort: 29092
          name: kafka
        - containerPort: 9644
          name: admin
        volumeMounts:
        - name: redpanda-storage
          mountPath: /var/lib/redpanda/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
  volumeClaimTemplates:
  - metadata:
      name: redpanda-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path  # K3s 기본 StorageClass
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: thock-prod
spec:
  selector:
    app: redpanda
  ports:
  - port: 29092
    targetPort: 29092
    name: kafka
  - port: 9644
    targetPort: 9644
    name: admin
  clusterIP: None  # Headless service for StatefulSet