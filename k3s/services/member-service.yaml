apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-service
  namespace: thock-prod
  labels:
    app: member-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-service
  template:
    metadata:
      labels:
        app: member-service
    spec:
      containers:
        - name: member-service
          image: sang234/member-service:latest
          ports:
            - containerPort: 8081
              name: http

          envFrom:
            # 공통 설정값들은 ConfigMap에서 가져오도록 설정 (예: TZ, JAVA_OPTS, SPRING_PROFILES_ACTIVE, MYSQL_HOST, MYSQL_PORT)
            - configMapRef:
                name: common-config
            # 민감한 정보들은 Secret에서 가져오도록 설정 (예: MYSQL_PASSWORD, KAFKA_BOOTSTRAP_SERVERS)
            - secretRef:
                name: app-secrets

          # 서비스 전용 값들만 명시
          env:
            - name: MYSQL_DATABASE
              value: "thock_member_db"
            - name: MYSQL_USER
              value: "thock_member_db_user"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MEMBER_DB_PASSWORD

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: member-service
  namespace: thock-prod
spec:
  selector:
    app: member-service
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  type: ClusterIP
