apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: thock-prod
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: sang234/payment-service:latest
        ports:
        - containerPort: 8084
          name: http
        env:
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: TZ
        - name: JAVA_OPTS
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: JAVA_OPTS
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: SPRING_PROFILES_ACTIVE
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: MYSQL_HOST
        - name: MYSQL_PORT
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: MYSQL_PORT
        - name: MYSQL_DATABASE
          value: "thock_payment_db"
        - name: MYSQL_USER
          value: "thock_payment_db_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: PAYMENT_DB_PASSWORD
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: LOG_PATH
          valueFrom:
            configMapKeyRef:
              name: common-config
              key: LOG_PATH
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8084
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: thock-prod
spec:
  selector:
    app: payment-service
  ports:
  - port: 8084
    targetPort: 8084
    name: http
  type: ClusterIP