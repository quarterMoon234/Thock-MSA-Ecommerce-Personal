services:
  # ==================== Kafka ====================
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    command:
      - redpanda start
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - thock-network

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    networks:
      - thock-network

  # ==================== MySQL Databases ====================
  member_db:
    image: mysql:8.0
    container_name: member_db
    environment:
      MYSQL_DATABASE: ${MEMBER_DB_NAME:-member_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - member-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thock-network

  product_db:
    image: mysql:8.0
    container_name: product_db
    environment:
      MYSQL_DATABASE: ${PRODUCT_DB_NAME:-product_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3308:3306"
    volumes:
      - product-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thock-network

  market_db:
    image: mysql:8.0
    container_name: market_db
    environment:
      MYSQL_DATABASE: ${MARKET_DB_NAME:-market_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3309:3306"
    volumes:
      - market-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thock-network

  payment_db:
    image: mysql:8.0
    container_name: payment_db
    environment:
      MYSQL_DATABASE: ${PAYMENT_DB_NAME:-payment_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3310:3306"
    volumes:
      - payment-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thock-network

  settlement_db:
    image: mysql:8.0
    container_name: settlement_db
    environment:
      MYSQL_DATABASE: ${SETTLEMENT_DB_NAME:-settlement_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3311:3306"
    volumes:
      - settlement-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thock-network

  # ==================== Application Services ====================
  member-service:
    build:
      context: .
      dockerfile: member-service/Dockerfile
    container_name: member-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MYSQL_HOST: member_db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MEMBER_DB_NAME:-member_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    depends_on:
      member_db:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      MYSQL_HOST: product_db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${PRODUCT_DB_NAME:-product_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    depends_on:
      product_db:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  market-service:
    build:
      context: .
      dockerfile: market-service/Dockerfile
    container_name: market-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      MYSQL_HOST: market_db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MARKET_DB_NAME:-market_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8081}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8083}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    depends_on:
      market_db:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - thock-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      MYSQL_HOST: payment_db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${PAYMENT_DB_NAME:-payment_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    depends_on:
      payment_db:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    container_name: settlement-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      MYSQL_HOST: settlement_db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${SETTLEMENT_DB_NAME:-settlement_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    depends_on:
      settlement_db:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

networks:
  thock-network:
    driver: bridge

volumes:
  member-db-data:
  product-db-data:
  market-db-data:
  payment-db-data:
  settlement-db-data:


