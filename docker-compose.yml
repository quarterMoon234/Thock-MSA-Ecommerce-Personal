services:
  # ==================== Kafka ====================
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    command:
      - redpanda start
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - thock-network

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    networks:
      - thock-network

  # ==================== MySQL Database (Single Container) ====================
  mysql:
    image: mysql:8.0
    container_name: thock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - thock-network

  # ==================== Application Services ====================
  member-service:
    build:
      context: .
      dockerfile: member-service/Dockerfile
    container_name: member-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: member_db
      MYSQL_USER: member_user
      MYSQL_PASSWORD: member_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/member:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/product:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  market-service:
    build:
      context: .
      dockerfile: market-service/Dockerfile
    container_name: market-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: market_db
      MYSQL_USER: market_user
      MYSQL_PASSWORD: market_pass
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8081}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8083}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/market:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - thock-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: payment_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/payment:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    container_name: settlement-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: settlement_db
      MYSQL_USER: settlement_user
      MYSQL_PASSWORD: settlement_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/settlement:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  # ==================== Monitoring Stack (Grafana + Loki + Prometheus) ====================
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    user: root
    environment:
      - TZ=Asia/Seoul
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - thock-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/apps:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - thock-network
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - thock-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - thock-network
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

networks:
  thock-network:
    driver: bridge

volumes:
  mysql-data:
  loki-data:
  prometheus-data:
  grafana-data:
