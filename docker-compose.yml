services:
  # ==================== Kafka ====================
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda
    command:
      - redpanda start
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - thock-network

  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    networks:
      - thock-network

  # ==================== MySQL Database (Single Container) ====================
  mysql:
    image: mysql:8.0
    container_name: thock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - thock-network

  # ==================== Application Services ====================
  member-service:
    build:
      context: .
      dockerfile: member-service/Dockerfile
    container_name: member-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: member_db
      MYSQL_USER: member_user
      MYSQL_PASSWORD: member_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/member:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/product:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  market-service:
    build:
      context: .
      dockerfile: market-service/Dockerfile
    container_name: market-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: market_db
      MYSQL_USER: market_user
      MYSQL_PASSWORD: market_pass
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8081}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8083}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/market:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - thock-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: payment_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/payment:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    container_name: settlement-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: -Duser.timezone=Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: settlement_db
      MYSQL_USER: settlement_user
      MYSQL_PASSWORD: settlement_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      LOG_PATH: /app/logs
    volumes:
      - ./logs/settlement:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - thock-network

networks:
  thock-network:
    driver: bridge

volumes:
  mysql-data:
