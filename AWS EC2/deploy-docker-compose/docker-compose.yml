  services:
    # ==================== API Gateway (외부 진입점) ====================
    api-gateway:
      image: sang234/api-gateway:latest
      container_name: api-gateway
      expose:
        - "8080"
      env_file:
        - .env
      environment:
        TZ: Asia/Seoul
        JAVA_OPTS: -Duser.timezone=Asia/Seoul
        SPRING_PROFILES_ACTIVE: prod
        JWT_SECRET_KEY: ${JWT_SECRET_KEY}
        LOG_PATH: /app/logs
      volumes:
        - ./logs/api-gateway:/app/logs
      depends_on:
        mysql:
          condition: service_healthy
        redpanda:
          condition: service_started
        member-service:
          condition: service_started
        product-service:
          condition: service_started
        market-service:
          condition: service_started
        payment-service:
          condition: service_started
        settlement-service:
          condition: service_started
      networks:
        - internal
      restart: unless-stopped

    # ==================== Application Services ====================
    member-service:
      image: sang234/member-service:latest
      container_name: member-service
      expose:
        - "8081"
      env_file:
        - .env
      environment:
        TZ: Asia/Seoul
        JAVA_OPTS: -Duser.timezone=Asia/Seoul
        SPRING_PROFILES_ACTIVE: prod
        MYSQL_HOST: mysql
        MYSQL_PORT: 3306
        MYSQL_DATABASE: thock_member_db
        MYSQL_USER: thock_member_db_user
        MYSQL_PASSWORD: ${MEMBER_DB_PASSWORD}
        KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
        LOG_PATH: /app/logs
      volumes:
        - ./logs/member:/app/logs
      depends_on:
        mysql:
          condition: service_healthy
        redpanda:
          condition: service_started
      networks:
        - internal
      restart: unless-stopped

    product-service:
      image: sang234/product-service:latest
      container_name: product-service
      expose:
        - "8082"
      env_file:
        - .env
      environment:
        TZ: Asia/Seoul
        JAVA_OPTS: -Duser.timezone=Asia/Seoul
        SPRING_PROFILES_ACTIVE: prod
        MYSQL_HOST: mysql
        MYSQL_PORT: 3306
        MYSQL_DATABASE: thock_product_db
        MYSQL_USER: thock_product_db_user
        MYSQL_PASSWORD: ${PRODUCT_DB_PASSWORD}
        KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
        LOG_PATH: /app/logs
      volumes:
        - ./logs/product:/app/logs
      depends_on:
        mysql:
          condition: service_healthy
        redpanda:
          condition: service_started
      networks:
        - internal
      restart: unless-stopped

    market-service:
      image: sang234/market-service:latest
      container_name: market-service
      expose:
        - "8083"
      env_file:
        - .env
      environment:
        TZ: Asia/Seoul
        JAVA_OPTS: -Duser.timezone=Asia/Seoul
        SPRING_PROFILES_ACTIVE: prod
        MYSQL_HOST: mysql
        MYSQL_PORT: 3306
        MYSQL_DATABASE: thock_market_db
        MYSQL_USER: thock_market_db_user
        MYSQL_PASSWORD: ${MARKET_DB_PASSWORD}
        PRODUCT_SERVICE_URL: http://product-service:8082
        PAYMENT_SERVICE_URL: http://payment-service:8084
        KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
        LOG_PATH: /app/logs
      volumes:
        - ./logs/market:/app/logs
      depends_on:
        mysql:
          condition: service_healthy
        product-service:
          condition: service_started
        payment-service:
          condition: service_started
        redpanda:
          condition: service_started
      networks:
        - internal
      restart: unless-stopped

    payment-service:
      image: sang234/payment-service:latest
      container_name: payment-service
      expose:
        - "8084"
      env_file:
        - .env
      environment:
        TZ: Asia/Seoul
        JAVA_OPTS: -Duser.timezone=Asia/Seoul
        SPRING_PROFILES_ACTIVE: prod
        MYSQL_HOST: mysql
        MYSQL_PORT: 3306
        MYSQL_DATABASE: thock_payment_db
        MYSQL_USER: thock_payment_db_user
        MYSQL_PASSWORD: ${PAYMENT_DB_PASSWORD}
        KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
        LOG_PATH: /app/logs
      volumes:
        - ./logs/payment:/app/logs
      depends_on:
        mysql:
          condition: service_healthy
        redpanda:
          condition: service_started
      networks:
        - internal
      restart: unless-stopped

    settlement-service:
      image: sang234/settlement-service:latest
      container_name: settlement-service
      expose:
        - "8085"
      env_file:
        - .env
      environment:
        TZ: Asia/Seoul
        JAVA_OPTS: -Duser.timezone=Asia/Seoul
        SPRING_PROFILES_ACTIVE: prod
        MYSQL_HOST: mysql
        MYSQL_PORT: 3306
        MYSQL_DATABASE: thock_settlement_db
        MYSQL_USER: thock_settlement_db_user
        MYSQL_PASSWORD: ${SETTLEMENT_DB_PASSWORD}
        KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
        LOG_PATH: /app/logs
      volumes:
        - ./logs/settlement:/app/logs
      depends_on:
        mysql:
          condition: service_healthy
        redpanda:
          condition: service_started
      networks:
        - internal
      restart: unless-stopped

    # ==================== Kafka ====================
    redpanda:
      image: redpandadata/redpanda:v24.1.1
      container_name: redpanda
      command:
        - redpanda start
        - --smp=1
        - --memory=512M
        - --reserve-memory=0M
        - --overprovisioned
        - --node-id=0
        - --check=false
        - --kafka-addr=PLAINTEXT://0.0.0.0:29092
        - --advertise-kafka-addr=PLAINTEXT://redpanda:29092
      networks:
        - internal
      volumes:
        - redpanda-data:/var/lib/redpanda/data
      restart: unless-stopped

    redpanda-console:
      image: redpandadata/console:v2.5.2
      container_name: redpanda-console
      depends_on:
        - redpanda
      expose:
        - "8090"
      environment:
        KAFKA_BROKERS: redpanda:29092
        SERVER_BASEPATH: /redpanda        
        SERVER_SETBASEPATHFROMXFORWARDEDPREFIX: "true"
        SERVER_LISTENPORT: 8090  
      networks:
        - internal
      restart: unless-stopped

    # ==================== MySQL Database ====================
    mysql:
      image: mysql:8.0
      container_name: thock-mysql
      environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        TZ: Asia/Seoul
      volumes:
        - mysql-data:/var/lib/mysql
        - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 10
      networks:
        - internal
      restart: unless-stopped

    # ==================== Monitoring ====================
    prometheus:
      image: prom/prometheus:v2.49.1
      container_name: prometheus
      expose:
        - "9090"
      volumes:
        - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        - prometheus-data:/prometheus
      command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.console.libraries=/usr/share/prometheus/console_libraries'
        - '--web.console.templates=/usr/share/prometheus/consoles'
      networks:
        - internal
      restart: unless-stopped

    loki:
      image: grafana/loki:2.9.4
      container_name: loki
      expose:
        - "3100"
      volumes:
        - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
        - loki-data:/loki
      command: -config.file=/etc/loki/local-config.yaml
      healthcheck:
        test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 10
      networks:
        - internal
      restart: unless-stopped

    promtail:
      image: grafana/promtail:2.9.4
      container_name: promtail
      volumes:
        - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
        - ./logs:/var/log/apps:ro
      command: -config.file=/etc/promtail/config.yml
      depends_on:
        loki:
          condition: service_healthy
      networks:
        - internal
      restart: unless-stopped

    grafana:
      image: grafana/grafana:10.3.1
      container_name: grafana
      expose:
        - "3000"
      environment:
        GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
        GF_USERS_ALLOW_SIGN_UP: "false"
        GF_SERVER_ROOT_URL: https://api.thock.site/grafana/
        GF_SERVER_SERVE_FROM_SUB_PATH: "true"         
      volumes:
        - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
        - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
        - grafana-data:/var/lib/grafana
      depends_on:
        - prometheus
        - loki
      networks:
        - internal
      restart: unless-stopped

    # ==================== Nginx (Reverse Proxy) ====================
    nginx:
      image: nginx:latest
      container_name: nginx
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        - ./nginx/certbot/www:/var/www/certbot
        - ./nginx/certbot/conf:/etc/letsencrypt
      depends_on:
        - api-gateway
      networks:
        - internal
      restart: unless-stopped

    certbot:
      image: certbot/certbot
      container_name: certbot
      volumes:
        - ./nginx/certbot/www:/var/www/certbot
        - ./nginx/certbot/conf:/etc/letsencrypt
      command: certonly --webroot -w /var/www/certbot -d api.thock.site --email admin@thock.site --agree-tos --no-eff-email
      networks:
        - internal

  # ==================== Networks ====================
  networks:
    internal:
      driver: bridge

  # ==================== Volumes ====================
  volumes:
    mysql-data:
    redpanda-data:
    prometheus-data:
    loki-data:
    grafana-data:
