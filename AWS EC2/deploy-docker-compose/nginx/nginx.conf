events {
    worker_connections 1024;
}

http {
    upstream api-gateway {
        server api-gateway:8080;
    }

    server {
        listen 80;
        server_name api.thock.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.thock.site;

        ssl_certificate /etc/letsencrypt/live/api.thock.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.thock.site/privkey.pem;

        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;
        }

      	location /redpanda/ {
       	    proxy_pass http://redpanda-console:8090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
      	}

        location / {
            proxy_pass http://api-gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            # 타임아웃 추가
            proxy_read_timeout 60s;
        }

        # 운영 보안: Swagger/API Docs 관리자 IP만 허용
        location = /swagger-ui.html {
            allow 220.79.119.124;
            deny all;
            proxy_pass http://api-gateway/swagger-ui.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /swagger-ui/ {
            allow 220.79.119.124;
            deny all;
            proxy_pass http://api-gateway/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /v3/api-docs {
            allow 220.79.119.124;
            deny all;
            proxy_pass http://api-gateway/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 운영 보안: Actuator 외부 노출 차단
        location ^~ /actuator/ { return 403; }
    }
}
