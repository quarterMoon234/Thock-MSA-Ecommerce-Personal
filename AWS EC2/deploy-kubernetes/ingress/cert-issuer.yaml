# Let's Encrypt Cert-Manager ClusterIssuer
# 사전 조건: Cert-Manager가 설치되어 있어야 합니다.
# 설치 방법: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt Production Server
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@thock.site  # 실제 이메일 주소로 변경하세요
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    # HTTP-01 Challenge (K3s Traefik Ingress 사용)
    - http01:
        ingress:
          class: traefik

    # DNS-01 Challenge (AWS Route53 사용 시 - 주석 해제)
    # - dns01:
    #     route53:
    #       region: ap-northeast-2
    #       # IAM Role 또는 Access Key 설정 필요
---
# Let's Encrypt Staging Server (테스트용)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Let's Encrypt Staging Server (테스트용 - Rate Limit 없음)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@thock.site
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: traefik
