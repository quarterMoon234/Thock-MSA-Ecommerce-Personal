apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thock-ingress
  namespace: thock-prod
  annotations:
    # K3s Traefik Ingress (기본 포함)
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  tls:
  - hosts:
    - api.thock.site
    secretName: thock-tls
  rules:
  - host: api.thock.site
    http:
      paths:
      # API Gateway (메인 진입점)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8080

      # Grafana
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000

      # Redpanda Console
      - path: /redpanda
        pathType: Prefix
        backend:
          service:
            name: redpanda-console
            port:
              number: 8090
  - http:
      paths:
      # EC2 퍼블릭 IP 접속용 fallback (도메인 미설정 시)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8080
