apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-service
  namespace: thock-prod
  labels:
    app: market-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-service
  template:
    metadata:
      labels:
        app: market-service
    spec:
      containers:
        - name: market-service
          image: sang234/market-service:latest
          ports:
            - containerPort: 8083
              name: http

          envFrom:
            # 공통 설정값들은 ConfigMap에서 가져오도록 설정 (예: TZ, JAVA_OPTS, SPRING_PROFILES_ACTIVE, MYSQL_HOST, MYSQL_PORT)
            - configMapRef:
                name: common-config
            # 민감한 정보들은 Secret에서 가져오도록 설정 (예: MYSQL_PASSWORD, KAFKA_BOOTSTRAP_SERVERS)
            - secretRef:
                name: app-secrets

          # 서비스 전용 값들만 명시
          env:
            - name: MYSQL_DATABASE
              value: "thock_market_db"
            - name: MYSQL_USER
              value: "thock_market_db_user"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MARKET_DB_PASSWORD
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8084"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 240
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 180
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10

          resources:
            requests:
              memory: "512Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: market-service
  namespace: thock-prod
spec:
  selector:
    app: market-service
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  type: ClusterIP
