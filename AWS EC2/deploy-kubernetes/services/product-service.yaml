apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: thock-prod
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: sang234/product-service:latest
          ports:
            - containerPort: 8082
              name: http

          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: app-secrets

          env:
            - name: MYSQL_DATABASE
              value: "thock_product_db"
            - name: MYSQL_USER
              value: "thock_product_db_user"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PRODUCT_DB_PASSWORD

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            timeoutSeconds: 5
            failureThreshold: 3
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            timeoutSeconds: 3
            failureThreshold: 3
            periodSeconds: 5

          resources:
            requests:
              memory: "512Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: thock-prod
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  type: ClusterIP
