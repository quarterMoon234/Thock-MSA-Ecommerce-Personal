apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
  namespace: thock-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-console
  template:
    metadata:
      labels:
        app: redpanda-console
    spec:
      containers:
      - name: redpanda-console
        image: redpandadata/console:v2.5.2
        ports:
        - containerPort: 8090
          name: http
        env:
        - name: KAFKA_BROKERS
          value: "redpanda:29092"
        - name: SERVER_BASEPATH
          value: "/redpanda"
        - name: SERVER_SETBASEPATHFROMXFORWARDEDPREFIX
          value: "true"
        - name: SERVER_LISTENPORT
          value: "8090"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console
  namespace: thock-prod
spec:
  selector:
    app: redpanda-console
  ports:
  - port: 8090
    targetPort: 8090
    name: http
  type: ClusterIP