groups:
  - name: http-error-rate
    interval: 30s
    rules:
      - record: app:http_requests:rate5m
        expr: |
          sum by (application) (
            rate(http_server_requests_seconds_count[5m])
          )

      - record: app:http_errors:rate5m
        expr: |
          sum by (application) (
            rate(http_server_requests_seconds_count{status=~"4..|5.."}[5m])
          )

      - record: app:http_error_ratio:percent5m
        expr: |
          100 * app:http_errors:rate5m
          /
          clamp_min(app:http_requests:rate5m, 0.001)

      - record: app:http_5xx_ratio:percent5m
        expr: |
          100 *
          sum by (application) (
            rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          )
          /
          clamp_min(
            sum by (application) (rate(http_server_requests_seconds_count[5m])),
            0.001
          )

      - alert: HighHttp5xxRatio
        expr: app:http_5xx_ratio:percent5m > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx ratio on {{ $labels.application }}"
          description: "5xx error ratio is {{ $value | printf \"%.2f\" }}% (5m avg)"
