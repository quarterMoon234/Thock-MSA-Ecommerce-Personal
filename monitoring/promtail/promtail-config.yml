server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ==================== Member Service ====================
  - job_name: member-app
    static_configs:
      - targets: [localhost]
        labels:
          job: member-service
          service: member
          log_type: app
          __path__: /var/log/apps/member/app*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
      - labels:
          level:
          logger:

  - job_name: member-api
    static_configs:
      - targets: [localhost]
        labels:
          job: member-service
          service: member
          log_type: api
          __path__: /var/log/apps/member/api*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
