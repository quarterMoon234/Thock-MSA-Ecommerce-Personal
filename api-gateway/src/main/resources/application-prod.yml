# ============================================
# Production 환경 (AWS EC2)
# ============================================

# Production에서도 Docker Compose 기반 주소를 사용하되
# 필요시 환경변수로 각 서비스 URL을 명시적으로 오버라이드 가능
service-endpoints:
  member: ${MEMBER_SERVICE_URL:http://member-service:8081}
  product: ${PRODUCT_SERVICE_URL:http://product-service:8082}
  market: ${MARKET_SERVICE_URL:http://market-service:8083}
  payment: ${PAYMENT_SERVICE_URL:http://payment-service:8084}
  settlement: ${SETTLEMENT_SERVICE_URL:http://settlement-service:8085}

# Swagger Production 설정
swagger:
  server:
    url: ${SWAGGER_SERVER_URL:http://13.209.190.62}
    description: Production API Gateway

# CORS Production 설정
cors:
  allowed.origins: ${CORS_ALLOWED_ORIGINS:http://13.209.190.62}

# 운영 보안: Swagger는 ingress IP allowlist로 제어 (애플리케이션 레벨은 활성 유지)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# 운영 보안: Actuator 노출 최소화
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# 운영 환경 로깅
logging:
  level:
    root: INFO
    com.thock.back.gateway: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
