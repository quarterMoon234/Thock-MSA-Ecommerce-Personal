# ============================================
# Production 환경 (AWS EC2)
# ============================================

# Production에서도 Docker Compose로 배포되므로
# application.yml의 기본값 (Docker 서비스 이름) 사용
# 또는 필요시 환경변수로 오버라이드 가능

# Swagger Production 설정
swagger:
  server:
    url: ${SWAGGER_SERVER_URL:http://13.209.190.62}
    description: Production API Gateway

# CORS Production 설정
cors:
  allowed.origins: ${CORS_ALLOWED_ORIGINS:http://13.209.190.62}

# 운영 보안: Swagger는 ingress IP allowlist로 제어 (애플리케이션 레벨은 활성 유지)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# 운영 보안: Actuator 노출 최소화
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# 운영 환경 로깅
logging:
  level:
    root: INFO
    com.thock.back.gateway: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
