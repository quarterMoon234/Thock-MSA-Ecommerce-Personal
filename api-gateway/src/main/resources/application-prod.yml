# ============================================
# Production 환경 (AWS EC2)
# ============================================

# Production에서도 Docker Compose로 배포되므로
# application.yml의 기본값 (Docker 서비스 이름) 사용
# 또는 필요시 환경변수로 오버라이드 가능

# Swagger Production 설정
swagger:
  server:
    url: ${SWAGGER_SERVER_URL:https://api.thock.site}
    description: Production API Gateway

# CORS Production 설정
cors:
  allowed.origins: ${CORS_ALLOWED_ORIGINS:https://thock.site,https://www.thock.site,https://api.thock.site}

# 운영 환경 로깅
logging:
  level:
    root: INFO
    com.thock.back.gateway: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN