# ============================================
# Docker 환경 (Docker Compose)
# ============================================

# Docker 환경에서는 서비스 이름으로 통신
service-endpoints:
  member: ${MEMBER_SERVICE_URL:http://member-service:8081}
  product: ${PRODUCT_SERVICE_URL:http://product-service:8082}
  market: ${MARKET_SERVICE_URL:http://market-service:8083}
  payment: ${PAYMENT_SERVICE_URL:http://payment-service:8084}
  settlement: ${SETTLEMENT_SERVICE_URL:http://settlement-service:8085}

# Swagger Docker 설정
swagger:
  server:
    url: http://localhost:8080
    description: Docker API Gateway

# CORS Docker 설정
cors:
  allowed.origins: http://localhost:8080,http://localhost:5173
