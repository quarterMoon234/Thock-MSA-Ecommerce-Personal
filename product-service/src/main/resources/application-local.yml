spring:

  kafka:
    bootstrap-servers: localhost:9092

  datasource:
    url: jdbc:mysql://localhost:3307/thock_product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: validate

# 로컬에서는 환경 변수 대신 application-local.yml에 JWT 시크릿 키를 직접 설정
jwt:
  secret: thock-local-jwt-secret-key-which-is-long-enough-32chars
  access-token-exp-seconds: 1800
  refresh-token-exp-seconds: 1209600
  issuer: thock-local

product:
  inbox:
    enabled: true

swagger:
  server:
    url: http://localhost:8080
    description: Local API Gateway
