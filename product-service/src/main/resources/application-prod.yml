spring:

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

  # Production JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # SQL 로그 끄기

logging:
  level:
    root: INFO
    com.thock.back: INFO

swagger:
  server:
    url: ${SWAGGER_SERVER_URL:http://13.209.190.62}
    description: Production API Gateway

product:
  inbox:
    enabled: true
